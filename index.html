<!doctype html>
<html lang="ar" dir="rtl">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="icon" type="image/x-icon" href="favicon.ico" />
        <title>إيصالات الصيانة</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link
            href="https://fonts.googleapis.com/css2?family=Tajawal:wght@500;700;800&family=IBM+Plex+Sans+Arabic:wght@400;500;600&display=swap"
            rel="stylesheet"
        />
        <script src="https://cdnjs.cloudflare.com/ajax/libs/jsbarcode/3.11.5/JsBarcode.all.min.js"></script>
        <style>
            :root {
                --navy: #1b3a57;
                --navy-med: #2c4f73;
                --bg: #f5f7fa;
                --card: #ffffff;
                --text: #232c36;
                --muted: #6b7280;
                --border: #e2e6eb;
                --received-fg: #475569;
                --received-bg: #eef1f4;
                --sent-fg: #92400e;
                --sent-bg: #fdf3e3;
                --resolved-fg: #1e6b45;
                --resolved-bg: #e4f5ea;
                --rejected-fg: #9b2c2c;
                --rejected-bg: #fbeaea;
            }
            * {
                box-sizing: border-box;
            }
            html,
            body {
                margin: 0;
                padding: 0;
            }
            body {
                background: var(--bg);
                color: var(--text);
                font-family: "IBM Plex Sans Arabic", sans-serif;
                min-height: 100vh;
            }
            h1,
            h2,
            h3,
            .display {
                font-family: "Tajawal", sans-serif;
            }
            .num {
                font-variant-numeric: tabular-nums;
                letter-spacing: 0.5px;
            }

            #app {
                max-width: 920px;
                margin: 0 auto;
                padding: 28px 20px 80px;
            }

            .topbar {
                display: flex;
                align-items: flex-end;
                justify-content: space-between;
                gap: 16px;
                margin-bottom: 22px;
                flex-wrap: wrap;
            }
            .topbar h1 {
                font-size: 26px;
                font-weight: 800;
                color: var(--navy);
                margin: 0 0 4px;
            }
            .topbar p {
                margin: 0;
                color: var(--muted);
                font-size: 14px;
            }
            .stat {
                background: var(--card);
                border: 1px solid var(--border);
                border-radius: 10px;
                padding: 10px 18px;
                text-align: center;
                min-width: 110px;
            }
            .stat .n {
                font-family: "Tajawal", sans-serif;
                font-size: 22px;
                font-weight: 800;
                color: var(--navy);
            }
            .stat .l {
                font-size: 12px;
                color: var(--muted);
            }

            .toolbar {
                display: flex;
                gap: 10px;
                margin-bottom: 16px;
                flex-wrap: wrap;
            }
            input,
            select,
            textarea {
                font-family: "IBM Plex Sans Arabic", sans-serif;
                border: 1px solid var(--border);
                border-radius: 8px;
                padding: 10px 12px;
                font-size: 14px;
                background: var(--card);
                color: var(--text);
            }
            input:focus,
            select:focus,
            textarea:focus {
                outline: 2px solid var(--navy-med);
                outline-offset: 1px;
            }
            .search {
                flex: 1;
                min-width: 180px;
            }

            button {
                font-family: "IBM Plex Sans Arabic", sans-serif;
                cursor: pointer;
                border: none;
                border-radius: 8px;
                font-size: 14px;
                padding: 10px 16px;
                font-weight: 600;
            }
            .btn-primary {
                background: var(--navy);
                color: #fff;
            }
            .btn-primary:hover {
                background: var(--navy-med);
            }
            .btn-ghost {
                background: transparent;
                color: var(--navy);
                border: 1px solid var(--border);
            }
            .btn-ghost:hover {
                background: #eef2f6;
            }
            .btn-sm {
                padding: 6px 12px;
                font-size: 13px;
            }

            .list {
                background: var(--card);
                border: 1px solid var(--border);
                border-radius: 12px;
                overflow: hidden;
            }
            .row {
                display: flex;
                align-items: center;
                gap: 14px;
                padding: 14px 16px;
                border-bottom: 1px solid var(--border);
                cursor: pointer;
            }
            .row:last-child {
                border-bottom: none;
            }
            .row:hover {
                background: #fafbfc;
            }
            .row .no {
                font-family: "Tajawal", sans-serif;
                font-weight: 800;
                font-size: 17px;
                color: var(--navy);
                min-width: 78px;
            }
            .row .who {
                flex: 1;
                min-width: 0;
            }
            .row .who b {
                display: block;
                font-size: 14.5px;
            }
            .row .who span {
                display: block;
                font-size: 12.5px;
                color: var(--muted);
                margin-top: 2px;
            }
            .row .meta {
                text-align: left;
                font-size: 12px;
                color: var(--muted);
                min-width: 90px;
            }
            .badge {
                display: inline-block;
                padding: 3px 10px;
                border-radius: 999px;
                font-size: 12px;
                font-weight: 600;
            }
            .badge.received {
                background: var(--received-bg);
                color: var(--received-fg);
            }
            .badge.sent {
                background: var(--sent-bg);
                color: var(--sent-fg);
            }
            .badge.resolved {
                background: var(--resolved-bg);
                color: var(--resolved-fg);
            }
            .badge.rejected {
                background: var(--rejected-bg);
                color: var(--rejected-fg);
            }

            .empty {
                padding: 60px 20px;
                text-align: center;
                color: var(--muted);
            }
            .empty b {
                display: block;
                color: var(--text);
                font-size: 15px;
                margin-bottom: 6px;
            }

            .overlay {
                position: fixed;
                inset: 0;
                background: rgba(20, 26, 33, 0.45);
                display: flex;
                align-items: flex-start;
                justify-content: center;
                padding: 40px 16px;
                overflow: auto;
                z-index: 50;
            }
            .panel {
                background: var(--card);
                border-radius: 14px;
                width: 100%;
                max-width: 640px;
                padding: 26px 26px 22px;
                box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25);
            }
            .panel h2 {
                margin: 0 0 4px;
                font-size: 20px;
                color: var(--navy);
            }
            .panel .sub {
                color: var(--muted);
                font-size: 13px;
                margin-bottom: 18px;
            }
            .field {
                margin-bottom: 14px;
            }
            .field label {
                display: block;
                font-size: 13px;
                font-weight: 600;
                margin-bottom: 6px;
                color: var(--text);
            }
            .field input,
            .field select,
            .field textarea {
                width: 100%;
            }
            .grid2 {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 14px;
            }
            .panel-actions {
                display: flex;
                justify-content: flex-start;
                gap: 10px;
                margin-top: 20px;
            }

            /* Ticket / detail */
            .ticket {
                background: var(--card);
                border: 1px solid var(--border);
                border-radius: 14px;
                overflow: hidden;
                margin-bottom: 18px;
            }
            .ticket-head {
                background: var(--navy);
                color: #fff;
                padding: 20px 24px;
                display: flex;
                justify-content: space-between;
                align-items: center;
                gap: 14px;
            }
            .ticket-head .no {
                font-family: "Tajawal", sans-serif;
                font-size: 30px;
                font-weight: 800;
            }
            .ticket-head .no small {
                font-size: 13px;
                font-weight: 500;
                opacity: 0.75;
                display: block;
                margin-bottom: 2px;
            }
            .ticket-body {
                padding: 22px 24px;
                border-bottom: 1px dashed var(--border);
            }
            .ticket-section {
                padding: 18px 24px;
                border-bottom: 1px dashed var(--border);
            }
            .ticket-section h4 {
                margin: 0 0 12px;
                font-size: 13px;
                color: var(--navy-med);
                font-weight: 700;
            }
            .inline-form {
                display: flex;
                gap: 10px;
                flex-wrap: wrap;
                align-items: flex-end;
            }
            .inline-form .f {
                display: flex;
                flex-direction: column;
                gap: 5px;
            }
            .inline-form .f label {
                font-size: 12px;
                color: var(--muted);
            }
            .readonly-block {
                background: #fafbfc;
                border: 1px solid var(--border);
                border-radius: 8px;
                padding: 12px 14px;
                font-size: 13.5px;
            }
            .readonly-block .meta {
                color: var(--muted);
                font-size: 12px;
                margin-top: 4px;
            }
            .link-btn {
                background: none;
                border: none;
                color: var(--navy-med);
                font-size: 12.5px;
                font-weight: 600;
                padding: 0;
                margin-top: 8px;
                cursor: pointer;
                text-decoration: underline;
            }
            .kv {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 14px 24px;
            }
            .kv .item span {
                display: block;
                font-size: 12px;
                color: var(--muted);
                margin-bottom: 3px;
            }
            .kv .item b {
                font-size: 14.5px;
            }
            .kv .item.full {
                grid-column: 1 / -1;
            }
            .status-row {
                padding: 16px 24px;
                display: flex;
                align-items: center;
                gap: 12px;
                flex-wrap: wrap;
            }
            .status-row label {
                font-size: 13px;
                font-weight: 600;
                color: var(--muted);
            }
            .actions-row {
                padding: 0 24px 20px;
                display: flex;
                gap: 10px;
                flex-wrap: wrap;
            }

            .history {
                background: var(--card);
                border: 1px solid var(--border);
                border-radius: 14px;
                padding: 20px 24px;
            }
            .history h3 {
                margin: 0 0 14px;
                font-size: 15px;
                color: var(--navy);
            }
            .hitem {
                display: flex;
                gap: 12px;
                padding: 10px 0;
                border-top: 1px solid var(--border);
            }
            .hitem:first-child {
                border-top: none;
            }
            .hitem .dot {
                width: 8px;
                height: 8px;
                border-radius: 50%;
                background: var(--navy-med);
                margin-top: 6px;
                flex: none;
            }
            .hitem .t {
                font-size: 12px;
                color: var(--muted);
                margin-bottom: 2px;
            }
            .hitem .n {
                font-size: 14px;
            }
            .tag {
                display: inline-block;
                font-size: 11px;
                padding: 1px 8px;
                border-radius: 999px;
                background: #eef2f6;
                color: var(--navy-med);
                font-weight: 600;
                margin-left: 8px;
            }
            .add-note {
                display: flex;
                gap: 10px;
                margin-top: 14px;
                align-items: flex-start;
                flex-wrap: wrap;
            }
            .add-note textarea {
                flex: 1;
                min-height: 44px;
                min-width: 180px;
                resize: vertical;
            }

            .back {
                background: none;
                border: none;
                color: var(--navy-med);
                font-weight: 600;
                padding: 0;
                margin-bottom: 14px;
                display: inline-flex;
                align-items: center;
                gap: 6px;
                cursor: pointer;
            }

            .hint {
                font-size: 12px;
                color: var(--muted);
                margin-top: 14px;
                line-height: 1.7;
            }

            @media (max-width: 560px) {
                .kv {
                    grid-template-columns: 1fr;
                }
                .grid2 {
                    grid-template-columns: 1fr;
                }
                .row {
                    flex-wrap: wrap;
                }
            }

            /* print */
            #printArea {
                display: none;
            }
            @media print {
                body * {
                    visibility: hidden;
                }
                #printArea,
                #printArea * {
                    visibility: visible;
                }
                #printArea {
                    display: block;
                    position: absolute;
                    top: 0;
                    right: 0;
                    left: 0;
                    width: 100%;
                    height: 100%;
                    margin: 0;
                    padding: 0;
                }
                @page {
                    size: A4 landscape;
                    margin: 0;
                }
                html,
                body {
                    background: #fff;
                    margin: 0;
                    padding: 0;
                }

                .print-wrapper {
                    display: flex;
                    flex-direction: row;
                    flex-wrap: nowrap;
                    width: 100%;
                    height: 100%;
                }
                .receipt-section {
                    width: 50%;
                    box-sizing: border-box;
                    padding: 6mm 8mm;
                    color: #000;
                    font-family:
                        "Segoe UI", Tahoma, "IBM Plex Sans Arabic", sans-serif;
                }
                .receipt-section:first-child {
                    /* Ensure the section is positioned so the line stays attached to it */
                    position: relative;
                    /* border-left is intentionally removed here */
                }

                /* This creates a custom line inside the first receipt section */
                .receipt-section:first-child::before {
                    content: "";
                    position: absolute;
                    left: 0;
                    top: 5%; /* Pushes the line down from the top edge */
                    height: 90%; /* Controls the exact height of the line */
                    border-left: 1px dashed #999;
                }

                .receipt-header {
                    border-bottom: 2px solid #000;
                    padding-bottom: 4px;
                    margin-bottom: 8px;
                }
                .r-header-row {
                    display: flex;
                    justify-content: space-between;
                    align-items: center;
                    gap: 10px;
                }
                .r-header-row + .r-header-row {
                    margin-top: 3px;
                }
                .r-logo-area {
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    gap: 6px;
                }
                .r-logo-area img {
                    height: 30px;
                    width: auto;
                    max-width: 70px;
                    object-fit: contain;
                }
                .r-logo-area h1 {
                    margin: 0;
                    font-size: 15px;
                    color: #333;
                    line-height: 1;
                }
                .r-meta {
                    font-size: 11px;
                    line-height: 1.3;
                }
                .r-barcodes {
                    display: flex;
                    gap: 10px;
                    align-items: flex-end;
                }
                .r-barcode-box {
                    display: flex;
                    flex-direction: column;
                    align-items: center;
                    font-size: 9px;
                    font-weight: bold;
                    color: #555;
                }
                .r-barcode-box svg {
                    max-width: 100%;
                    height: 18px;
                }

                .r-data {
                    display: grid;
                    grid-template-columns: 1fr 1fr;
                    gap: 5px 10px;
                    margin-bottom: 10px;
                    font-size: 12px;
                }
                .r-data-row {
                    border-bottom: 1px dashed #ccc;
                    padding-bottom: 3px;
                }
                .r-data-row .label {
                    font-weight: bold;
                    display: inline-block;
                    width: 100px;
                }

                .r-complain {
                    border: 1px solid #000;
                    padding: 5px;
                    margin-bottom: 8px;
                    border-radius: 3px;
                    font-size: 12px;
                }
                .r-complain strong {
                    display: block;
                    margin-bottom: 2px;
                    border-bottom: 1px solid #eee;
                    padding-bottom: 2px;
                }
                .r-notes-row {
                    margin-top: 4px;
                    padding-top: 3px;
                    border-top: 1px dashed #ccc;
                    font-size: 12px;
                }
                .r-notes-row strong {
                    display: inline;
                    border-bottom: none;
                    padding-bottom: 0;
                    margin-bottom: 0;
                }

                .r-terms {
                    font-size: 10px;
                    line-height: 1.4;
                    margin-bottom: 8px;
                }
                .r-terms h3 {
                    text-align: center;
                    font-weight: bold;
                    background: #f0f0f0;
                    padding: 3px;
                    border-radius: 3px;
                    margin: 0 0 4px;
                    font-size: 12px;
                }
                .r-terms p.intro {
                    margin: 2px 0 4px;
                    font-weight: bold;
                    font-size: 11px;
                }

                .r-signatures {
                    display: flex;
                    justify-content: space-between;
                    margin-top: 10px;
                    font-weight: bold;
                    font-size: 11px;
                }
                .r-signatures div {
                    width: 130px;
                    text-align: center;
                    border-top: 1px solid #000;
                    padding-top: 4px;
                }
            }
        </style>
    </head>
    <body>
        <div id="app"></div>
        <div id="printArea"></div>

        <script>
            const fmtNo = (n) => String(n);
            const now = () => new Date();
            const fmtDate = (d) => {
                const dt = typeof d === "string" ? new Date(d) : d;
                return dt.toLocaleString("en-GB", {
                    year: "numeric",
                    month: "2-digit",
                    day: "2-digit",
                    hour: "2-digit",
                    minute: "2-digit",
                    hour12: true,
                });
            };
            function generateReceiptCode() {
                const d = now();
                const yy = String(d.getFullYear()).slice(-2);
                const mm = String(d.getMonth() + 1).padStart(2, "0");
                const dd = String(d.getDate()).padStart(2, "0");
                const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
                let rand = "";
                for (let i = 0; i < 4; i++)
                    rand += chars.charAt(
                        Math.floor(Math.random() * chars.length),
                    );
                return `${yy}${mm}${dd}-${rand}`;
            }
            const STAGES = {
                received: { label: "استلام", cls: "received" },
                diagnosed: { label: "اتفحص فنيًا", cls: "received" },
                onsite_replace: { label: "اتستبدل على المحل", cls: "resolved" },
                reject_customer_fault: {
                    label: "مرفوض - عطل من العميل",
                    cls: "rejected",
                },
                reject_out_of_warranty: {
                    label: "مرفوض - خارج الضمان",
                    cls: "rejected",
                },
                sent_main_branch: { label: "اتبعت للفرع الرئيسي", cls: "sent" },
                sent_distributor: {
                    label: "اتبعت للموزع المعتمد",
                    cls: "sent",
                },
                closed_repaired: { label: "اتصلح", cls: "resolved" },
                closed_replaced: {
                    label: "اتستبدل من الموزع",
                    cls: "resolved",
                },
                closed_refunded: { label: "استرجاع مبلغ", cls: "resolved" },
                closed_rejected_ext: {
                    label: "رفض من الجهة اللي اتبعتله",
                    cls: "rejected",
                },
            };
            const DECISIONS = {
                onsite_replace: "استبدال / استرجاع فوري (خلال ١٤ يوم)",
                reject_customer_fault: "رفض — عطل بسبب العميل",
                reject_out_of_warranty: "رفض — خارج فترة الضمان",
                sent_main_branch: "إرسال للفرع الرئيسي للفحص",
                sent_distributor: "إرسال للموزع المعتمد مباشرة",
            };
            const TERMINAL_DECISIONS = [
                "onsite_replace",
                "reject_customer_fault",
                "reject_out_of_warranty",
            ];
            const EXTERNAL_RESOLUTIONS = {
                closed_repaired: "تم الإصلاح",
                closed_replaced: "تم الاستبدال",
                closed_refunded: "تم استرجاع المبلغ",
                closed_rejected_ext: "مرفوض من الجهة اللي استلمته",
            };
            const TYPE_LABELS = {
                general: "ملاحظة",
                call: "مكالمة مع العميل",
                external: "رد من الفرع الرئيسي / الموزع",
                system: "تحديث النظام",
            };
            function computeStage(rec) {
                if (rec.externalResolution) return rec.externalResolution;
                if (rec.decision) return rec.decision;
                if (rec.diagnosis) return "diagnosed";
                return "received";
            }
            function isClosed(rec) {
                if (rec.externalResolution) return true;
                if (rec.decision && TERMINAL_DECISIONS.includes(rec.decision))
                    return true;
                return false;
            }
            function awaitingExternal(rec) {
                return (
                    rec.decision === "sent_main_branch" ||
                    rec.decision === "sent_distributor"
                );
            }

            const localDB = {
                async get(key) {
                    const v = localStorage.getItem(key);
                    if (v === null) throw new Error("not found: " + key);
                    return { key, value: v };
                },
                async set(key, value) {
                    localStorage.setItem(key, value);
                    return { key, value };
                },
                async list(prefix) {
                    const keys = [];
                    for (let i = 0; i < localStorage.length; i++) {
                        const k = localStorage.key(i);
                        if (k && k.indexOf(prefix) === 0) keys.push(k);
                    }
                    return { keys };
                },
            };

            let state = {
                view: "loading", // loading | list | new | detail | error
                receipts: [],
                search: "",
                activeId: null,
                saving: false,
                errorMsg: "",
                editingDecision: false,
            };

            async function loadAll() {
                state.view = "loading";
                render();
                try {
                    let keys = [];
                    try {
                        const r = await localDB.list("receipt-");
                        keys = ((r && r.keys) || []).filter(
                            (k) => k !== "receipt-counter",
                        );
                    } catch (e) {
                        keys = [];
                    }
                    const items = [];
                    for (const k of keys) {
                        try {
                            const res = await localDB.get(k);
                            if (res && res.value)
                                items.push(JSON.parse(res.value));
                        } catch (e) {
                            /* skip unreadable key */
                        }
                    }
                    items.sort((a, b) => b.number - a.number);
                    state.receipts = items;
                    state.view = "list";
                } catch (e) {
                    state.view = "error";
                    state.errorMsg =
                        "مقدرش أجيب الإيصالات دلوقتي. جرّب تحدّث الصفحة.";
                }
                render();
            }

            async function nextNumber() {
                // tries the real generator; regenerates on the rare chance of a same-day collision
                for (let attempt = 0; attempt < 10; attempt++) {
                    const code = generateReceiptCode();
                    try {
                        await localDB.get("receipt-" + code);
                        // no error thrown -> key already exists, try again
                    } catch (e) {
                        return code; // not found -> free to use
                    }
                }
                return (
                    generateReceiptCode() +
                    "-" +
                    Date.now().toString(36).slice(-3).toUpperCase()
                );
            }

            async function createReceipt(data) {
                state.saving = true;
                render();
                try {
                    const number = await nextNumber();
                    const rec = {
                        id: "receipt-" + number,
                        number,
                        createdAt: now().toISOString(),
                        customerName: data.customerName,
                        customerPhone: data.customerPhone,
                        productName: data.productName,
                        serialNumber: data.serialNumber || "",
                        purchaseDate: data.purchaseDate || "",
                        invoiceNumber: data.invoiceNumber || "",
                        warrantyStatus: data.warrantyStatus || "out",
                        attachments: data.attachments || "",
                        issue: data.issue,
                        notes: data.notes || "",
                        receivedBy: data.receivedBy,

                        decision: null,
                        decisionAt: null,
                        decisionBy: null,
                        externalResolution: null,
                        history: [
                            {
                                at: now().toISOString(),
                                by: data.receivedBy,
                                note: "اتفتح السند واستلمنا الجهاز في الفرع.",
                                type: "system",
                            },
                        ],
                    };

                    state.receipts.unshift(rec);
                    state.activeId = rec.id;
                    state.view = "detail";
                } catch (e) {
                    alert("حصل خطأ وإحنا بنحفظ السند. جرّب تاني.");
                }
                state.saving = false;
                render();
            }

            async function saveReceipt(rec) {
                await localDB.set(rec.id, JSON.stringify(rec));
                const idx = state.receipts.findIndex((r) => r.id === rec.id);
                if (idx > -1) state.receipts[idx] = rec;
            }

            async function exportBackup() {
                const counterRes = await localDB
                    .get("receipt-counter")
                    .catch(() => ({ value: "0" }));
                const payload = {
                    exportedAt: now().toISOString(),
                    counter: counterRes.value || "0",
                    receipts: state.receipts,
                };
                const blob = new Blob([JSON.stringify(payload, null, 2)], {
                    type: "application/json",
                });
                const url = URL.createObjectURL(blob);
                const a = document.createElement("a");
                a.href = url;
                a.download =
                    "نسخة-احتياطية-ايصالات-الصيانة-" +
                    now().toISOString().slice(0, 10) +
                    ".json";
                document.body.appendChild(a);
                a.click();
                a.remove();
                URL.revokeObjectURL(url);
            }

            async function importBackup(file) {
                const text = await file.text();
                let payload;
                try {
                    payload = JSON.parse(text);
                } catch (e) {
                    alert("الملف ده مش نسخة احتياطية صالحة.");
                    return;
                }
                if (
                    !confirm(
                        "استرجاع النسخة الاحتياطية هيستبدل كل البيانات الحالية على الجهاز ده. متأكد؟",
                    )
                )
                    return;
                await localDB.set(
                    "receipt-counter",
                    String(payload.counter || 0),
                );
                for (const rec of payload.receipts || []) {
                    await localDB.set(rec.id, JSON.stringify(rec));
                }
                await loadAll();
            }

            async function recordDiagnosis(id, text, by) {
                const rec = state.receipts.find((r) => r.id === id);
                if (!rec) return;
                rec.diagnosis = { text, by, at: now().toISOString() };
                rec.history.unshift({
                    at: now().toISOString(),
                    by,
                    note: "تشخيص الفني: " + text,
                    type: "system",
                });
                await saveReceipt(rec);
                render();
            }

            async function recordDecision(id, decisionKey, by) {
                const rec = state.receipts.find((r) => r.id === id);
                if (!rec || !DECISIONS[decisionKey]) return;
                rec.decision = decisionKey;
                rec.decisionAt = now().toISOString();
                rec.decisionBy = by;
                rec.externalResolution = null; // a re-decision resets any prior external answer
                rec.history.unshift({
                    at: now().toISOString(),
                    by,
                    note: "القرار: " + DECISIONS[decisionKey],
                    type: "system",
                });
                await saveReceipt(rec);
                render();
            }

            async function recordExternalResolution(id, resKey, by) {
                const rec = state.receipts.find((r) => r.id === id);
                if (!rec || !EXTERNAL_RESOLUTIONS[resKey]) return;
                rec.externalResolution = resKey;
                rec.history.unshift({
                    at: now().toISOString(),
                    by,
                    note: "الرد النهائي: " + EXTERNAL_RESOLUTIONS[resKey],
                    type: "system",
                });
                await saveReceipt(rec);
                render();
            }

            async function addNote(id, text, type, by) {
                const rec = state.receipts.find((r) => r.id === id);
                if (!rec || !text) return;
                rec.history.unshift({
                    at: now().toISOString(),
                    by: by || rec.receivedBy,
                    note: text,
                    type: type || "general",
                });
                await saveReceipt(rec);
                render();
            }

                            ">": "&gt;",
                            '"': "&quot;",
                            "'": "&#39;",

            }

                "يحق الاستبدال والاسترجاع خلال 14 يومًا من تاريخ الشراء.",
                "الضمان على عيوب الصناعة (الهاردوير) فقط، وليس على سوء الاستخدام (مثل: سائل منسكب، كسر، إلخ...)، أو السوفت وير مثل (ويندوز أو البرامج) المثبتة على الجهاز من قبل العميل.",
                "لا يتم استلام أي صيانة إلا مع وجود فاتورة الشراء.",
                "يعتبر الصنف خارج الضمان في حالة وجود كشط أو خدوش في الرقم التسلسلي، أو رقم الموديل، أو رقم الصنف، أو أي من البيانات الأصلية للمنتج، أو وجود خدوش مؤثرة في المنتج.",
                "تقوم الشركة بفحص المنتج فحصًا ظاهريًا بالعين فقط عند الاستلام، ولا يعتبر المنتج مطابقًا لشروط الضمان إلا بعد رد المورد، وذلك خلال 15 يومًا من تاريخ استلام المورد للمنتج.",
                "في حالة عدم توافر المنتج البديل، أو انتهاء عمر المنتج، أو إيقاف إنتاجه، يتم إعادة قيمة شراء المنتج الموجودة بالفاتورة إلى حساب العميل لشراء منتج آخر.",
                "طبقًا لقرارات الشركة المصنعة للمنتجات، لا يعتبر وجود من 1 إلى 5 بيكسلات معيبة عيبًا في الشاشة، وعند ظهور عدد أكبر من ذلك يتم إحضار الشاشة إلى مركز خدمة العملاء.",

                'في حالة ضياع الإيصال، يرجى الاتصال برقم <strong dir="ltr">+20 10 99230060</strong> والإبلاغ عن ضياعه، أو حضور صاحب البيانات الموضحة بالإيصال.',
                "مدة صيانة القطعة المطلوبة للمنتج خلال فترة الضمان تتراوح بين 20 إلى 25 يوم عمل حتى وصول القطعة.",
                "ملحوظة: الشركة لا تتحمل أي مسؤولية قانونية عن أي برامج مسجلة على جهاز العميل، ويتحمل العميل المسؤولية القانونية الكاملة عن جميع البرامج الموجودة على جهازه.",
                "الشركة غير مسؤولة عن أي بيانات (Data) أو سوفت وير (مثل: ويندوز أو البرامج المثبتة) الموجودة على الجهاز من قبل العميل.",
            ];

            function receiptCopyHtml(r) {
                return `
    <div class="receipt-section">
      <div class="receipt-header">
        <div class="r-header-row">
          <div class="r-meta"><div><strong>رقم الإيصال: </strong><span dir="ltr">${fmtNo(r.number)}</span></div></div>
          <div class="r-logo-area">
            <img src="logo.png" alt="شعار ${esc(COMPANY_NAME)}" onerror="this.style.display='none'">
          </div>
        </div>
        <div class="r-header-row">
          <div class="r-meta"><div><strong>التاريخ: </strong><span dir="ltr">${fmtDate(r.createdAt)}</span></div></div>
          <div class="r-barcodes">
            <div class="r-barcode-box"><span>رقم الإيصال</span><svg class="r-barcode-receipt"></svg></div>
            <div class="r-barcode-box"><span>السيريال</span><svg class="r-barcode-serial"></svg></div>
          </div>
        </div>
      </div>
      <div class="r-data">

        <div class="r-data-row"><span class="label">نوع الجهاز: </span><span>${esc(r.productName)}</span></div>
        <div class="r-data-row"><span class="label">الرقم المسلسل: </span><span>${esc(r.serialNumber) || "—"}</span></div>
        <div class="r-data-row"><span class="label">رقم فاتورة الشراء: </span><span>${esc(r.invoiceNumber) || "—"}</span></div>
        <div class="r-data-row"><span class="label">تاريخ الشراء: </span><span>${r.purchaseDate || "—"}</span></div>
        <div class="r-data-row"><span class="label">حالة الضمان: </span><span>${r.warrantyStatus === "in" ? "داخل الضمان" : "خارج الضمان (NA)"}</span></div>
        <div class="r-data-row"><span class="label">مرفقات الجهاز: </span><span>${esc(r.attachments) || "—"}</span></div>
      </div>
      <div class="r-complain">
        <strong>نوع العطل (الشكوى):</strong>
        <span>${esc(r.issue) || "—"}</span>
        ${r.notes ? `<div class="r-notes-row"><strong>ملاحظات: </strong><span>${esc(r.notes)}</span></div>` : ""}
      </div>
      <div class="r-terms">
        <h3>شروط الضمان</h3>
        <p class="intro">عزيزي العميل، يرجى قراءة الشروط التالية لتسهيل تقديم أفضل خدمة لك.</p>
        <p class="intro">يسري هذا الضمان على البضاعة المباعة بالشروط التالية:</p>
        <ul>${TERMS_ITEMS.map((t) => `<li>${t}</li>`).join("")}</ul>
      </div>
      <div class="r-signatures">
        <div>توقيع المستلم (المهندس)</div>
        <div>توقيع العميل</div>
      </div>
    </div>
  `;
            }

            function printReceipt(r) {
                const pa = document.getElementById("printArea");
                pa.innerHTML = `<div class="print-wrapper">${receiptCopyHtml(r)}${receiptCopyHtml(r)}</div>`;
                if (window.JsBarcode) {
                    const opts = {
                        width: 1.2,
                        height: 18,
                        displayValue: false,
                        margin: 0,
                        background: "transparent",
                    };
                    document
                        .querySelectorAll("#printArea .r-barcode-receipt")
                        .forEach((el) => {
                            try {
                                JsBarcode(el, String(r.number), opts);
                            } catch (e) {}
                        });
                    document
                        .querySelectorAll("#printArea .r-barcode-serial")
                        .forEach((el) => {
                            try {
                                JsBarcode(el, r.serialNumber || "000000", opts);
                            } catch (e) {}
                        });
                }
                window.print();
            }

            loadAll();
        </script>
    </body>
</html>
